<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  @keyframes promoGlow { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
  @keyframes promoRise { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes promoSweep { 0%{transform:translateX(-120%) skewX(-18deg);opacity:0} 18%{opacity:.5} 40%{transform:translateX(120%) skewX(-18deg);opacity:0} 100%{transform:translateX(120%) skewX(-18deg);opacity:0} }
</style>
</helmet>
<div style="width:1200px;height:900px;position:relative;overflow:hidden;background:#0F1014;color:#F4EFE2;font-family:'Newsreader',Georgia,serif;display:flex;flex-direction:column;justify-content:space-between;padding:64px 72px;box-sizing:border-box;">

  <!-- full-bleed hero photograph -->
  <img src="assets/tauranga-ai-bg.jpg" alt="Mount Maunganui with AI network overlay" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 38%;z-index:0;" />

  <!-- legibility scrims: overall darken + top + bottom gradients + green tone -->
  <div style="position:absolute;inset:0;z-index:1;background:linear-gradient(180deg, rgba(15,16,20,0.62) 0%, rgba(15,16,20,0.30) 30%, rgba(15,16,20,0.34) 58%, rgba(15,16,20,0.80) 100%);"></div>
  <div style="position:absolute;inset:0;z-index:1;background:radial-gradient(120% 80% at 50% 46%, transparent 30%, rgba(15,16,20,0.55) 100%), radial-gradient(90% 60% at 8% 96%, rgba(17,40,20,0.5), transparent 60%);"></div>

  <!-- animated neural shimmer over the photo -->
  <canvas ref="{{ canvasRef }}" width="2400" height="1800" style="position:absolute;inset:0;width:1200px;height:900px;z-index:2;opacity:0.55;mix-blend-mode:screen;"></canvas>

  <!-- corner registration brackets -->
  <div style="position:absolute;left:40px;top:40px;width:34px;height:34px;border-left:1px solid rgba(124,204,30,0.55);border-top:1px solid rgba(124,204,30,0.55);z-index:4;"></div>
  <div style="position:absolute;right:40px;top:40px;width:34px;height:34px;border-right:1px solid rgba(124,204,30,0.55);border-top:1px solid rgba(124,204,30,0.55);z-index:4;"></div>
  <div style="position:absolute;left:40px;bottom:40px;width:34px;height:34px;border-left:1px solid rgba(124,204,30,0.55);border-bottom:1px solid rgba(124,204,30,0.55);z-index:4;"></div>
  <div style="position:absolute;right:40px;bottom:40px;width:34px;height:34px;border-right:1px solid rgba(124,204,30,0.55);border-bottom:1px solid rgba(124,204,30,0.55);z-index:4;"></div>

  <header style="position:relative;z-index:5;display:flex;justify-content:space-between;align-items:baseline;animation:promoRise .9s ease both;">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:#7CCC1E;">Faith · Work · The Future</span>
  </header>

  <div style="position:relative;z-index:5;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;animation:promoRise 1.1s ease both;animation-delay:.1s;">
    <div style="position:relative;overflow:hidden;">
      <h1 style="font-weight:300;line-height:.88;font-size:280px;letter-spacing:-.02em;margin:0;text-align:center;text-shadow:0 4px 24px rgba(0,0,0,0.7), 0 8px 70px rgba(124,204,30,0.28);">AI<span style="font-family:'Instrument Serif',Georgia,serif;font-style:italic;color:#E8C96A;font-weight:400;padding:0 .05em;">&amp;</span><span style="font-family:'Instrument Serif',Georgia,serif;font-style:italic;color:#7CCC1E;font-weight:400;">You</span></h1>
      <div style="position:absolute;top:0;left:0;width:42%;height:100%;background:linear-gradient(90deg,transparent,rgba(244,239,226,0.16),transparent);animation:promoSweep 6s ease-in-out 1.4s infinite;pointer-events:none;"></div>
    </div>
  </div>

  <footer style="position:relative;z-index:5;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(244,239,226,0.14);padding-top:24px;animation:promoRise 1.3s ease both;animation-delay:.2s;">
    <div style="display:flex;flex-direction:column;gap:8px;">
      <span style="font-family:'Newsreader',serif;font-weight:300;font-size:36px;letter-spacing:.005em;line-height:1;">Thursday 16 July 2026</span>
      <span style="display:flex;align-items:center;gap:12px;font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:rgba(244,239,226,0.6);"><span style="width:5px;height:5px;border-radius:50%;background:#7CCC1E;box-shadow:0 0 12px rgba(124,204,30,0.9);"></span>7:00 PM · Holy Trinity, Tauranga</span>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div style="text-align:right;display:flex;flex-direction:column;gap:3px;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(244,239,226,0.42);">Led by</span>
        <span style="font-family:'Newsreader',serif;font-weight:400;font-size:22px;line-height:1;">Nathaniel Baldock</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,239,226,0.42);">nathanielbaldock.com</span>
      </div>
      <img src="assets/nathaniel-baldock-portrait.png" alt="Nathaniel Baldock" style="width:84px;height:84px;border-radius:50%;object-fit:cover;object-position:center 22%;flex:none;border:1px solid rgba(244,239,226,0.24);box-shadow:0 0 0 4px rgba(124,204,30,0.14);" />
    </div>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900}}">
class Component extends DCLogic {
  canvasRef = React.createRef();

  componentDidMount() {
    const cv = this.canvasRef.current;
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const W = 2400, H = 1800;
    const CX = W / 2, CY = H * 0.48;
    const N = 88;
    const rand = (a, b) => a + Math.random() * (b - a);
    // center-weighted node distribution
    const nodes = Array.from({ length: N }, () => {
      const ang = rand(0, Math.PI * 2);
      const rad = Math.pow(Math.random(), 0.6) * 1100;
      return {
        x: CX + Math.cos(ang) * rad, y: CY + Math.sin(ang) * rad,
        vx: rand(-0.16, 0.16), vy: rand(-0.16, 0.16),
        r: rand(1.3, 3.4),
        gold: Math.random() < 0.16,
      };
    });
    const LINK = 250;
    const rings = [];
    let t = 0;

    const step = () => {
      ctx.clearRect(0, 0, W, H);
      t++;

      // emanating signal pulses
      if (t % 150 === 0) rings.push({ r: 40, a: 0.5 });
      for (let i = rings.length - 1; i >= 0; i--) {
        const ring = rings[i];
        ring.r += 3.4;
        ring.a *= 0.992;
        if (ring.a < 0.02 || ring.r > 1400) { rings.splice(i, 1); continue; }
        ctx.strokeStyle = `rgba(124,204,30,${ring.a})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.arc(CX, CY, ring.r, 0, Math.PI * 2);
        ctx.stroke();
      }

      for (const n of nodes) {
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
      }
      // links
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const a = nodes[i], b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d = Math.hypot(dx, dy);
          if (d < LINK) {
            const o = (1 - d / LINK) * 0.42;
            ctx.strokeStyle = `rgba(124,204,30,${o})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
          }
        }
      }
      // nodes
      for (const n of nodes) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = n.gold ? 'rgba(232,201,106,0.95)' : 'rgba(180,235,120,0.9)';
        ctx.fill();
      }
      this._raf = requestAnimationFrame(step);
    };
    step();
  }

  componentWillUnmount() {
    if (this._raf) cancelAnimationFrame(this._raf);
  }

  renderVals() {
    return { canvasRef: this.canvasRef };
  }
}
</script>
</body>
</html>
